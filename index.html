<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJiT's Page</title>
    <style>
        :root { --bg-1: #0f0c29; --bg-2: #302b63; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            color: white;
        }

        /* Animated Background */
        #bg-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: -1;
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glass Container */
        .content {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 4rem 3rem;
            border-radius: 30px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: 3rem; 
            margin: 0 0 1rem 0; 
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
        }

        /* The Primary Action Button */
        .btn-play {
            display: inline-block;
            text-decoration: none;
            background: #ffffff;
            color: #1a2a6c;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-play:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.3);
            background: #23d5ab;
            color: white;
        }

        /* Small refresh link */
        .refresh-link {
            display: block;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="content">
        <h1 id="greeting">Welcome</h1>
        <p>Ready to test your skills?</p>
        
        <a href="game.html" class="btn-play">Start Game</a>

        <span class="refresh-link" onclick="location.reload()">Change Vibe</span>
    </div>

    <script>
        /* RANDOM BACKGROUND LOGIC */
        const palettes = [
            ['#4158D0', '#C850C0', '#FFCC70'],
            ['#0093E9', '#80D0C7'],
            ['#8E2DE2', '#4A00E0'],
            ['#f953c6', '#b91d73'],
            ['#12c2e9', '#c471ed', '#f64f59']
        ];
        const randomPalette = palettes[Math.floor(Math.random() * palettes.length)];
        const bg = document.getElementById('bg-canvas');
        bg.style.background = `linear-gradient(135deg, ${randomPalette.join(', ')})`;

        /* GREETING LOGIC */
        const hour = new Date().getHours();
        const greetingEl = document.getElementById('greeting');
        if (hour < 12) greetingEl.innerText = "Good morning.";
        else if (hour < 18) greetingEl.innerText = "Good afternoon.";
        else greetingEl.innerText = "Good evening.";
    </script>
</body>
</html>
