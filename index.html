<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJiT's Page</title>
    <style>
        :root { --bg-1: #000; --bg-2: #434343; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            color: white;
        }

        /* Animated Background */
        #bg-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: -1;
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glass Container */
        .content {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 85%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Responsive Iframe Wrapper */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Ratio */
            margin: 1.5rem 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; border: none;
        }

        h1 { font-size: 2.5rem; margin: 0; font-weight: 300; }
        button {
            background: white; border: none; padding: 10px 25px;
            border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="content">
        <h1 id="greeting">Welcome</h1>
        
        <div class="iframe-container">
            <iframe id="blob-target"></iframe>
        </div>

        <button onclick="location.reload()">Refresh Vibe</button>
    </div>

    <script>
        /* 1. PASTE YOUR CUSTOM HTML CODE HERE */
        const myCustomHTML = `
          
        `;

        /* 2. BLOB INJECTION LOGIC */
        const iframe = document.getElementById('blob-target');
        const blob = new Blob([myCustomHTML], { type: 'text/html' });
        iframe.src = URL.createObjectURL(blob);

        /* 3. RANDOM BACKGROUND LOGIC */
        const palettes = [
            ['#4158D0', '#C850C0', '#FFCC70'],
            ['#0093E9', '#80D0C7'],
            ['#8EC5FC', '#E0C3FC'],
            ['#FBAB7E', '#F7CE68'],
            ['#21d4fd', '#b721ff']
        ];
        const randomPalette = palettes[Math.floor(Math.random() * palettes.length)];
        const bg = document.getElementById('bg-canvas');
        bg.style.background = `linear-gradient(160deg, ${randomPalette.join(', ')})`;

        /* 4. GREETING LOGIC */
        const hour = new Date().getHours();
        const greetingEl = document.getElementById('greeting');
        if (hour < 12) greetingEl.innerText = "Good morning.";
        else if (hour < 18) greetingEl.innerText = "Good afternoon.";
        else greetingEl.innerText = "Good evening.";
    </script>
</body>
</html>
